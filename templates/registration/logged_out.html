{% extends "registration/../base.html" %}

{% block content %}
  <p>Logged out!</p>

  <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-link nav-link" style="display:inline; cursor:pointer;">
      Logout
    </button>
  </form>
{% endblock %}
